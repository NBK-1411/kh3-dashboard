<section class="section-block crm-sync" aria-labelledby="crm-sync-title">
  <div class="section-header compact">
    <div>
      <p class="eyebrow">CRM connection</p>
      <h2 id="crm-sync-title">Live company data</h2>
    </div>
    <span class="status-badge success" data-crm-health>Connected</span>
  </div>
  <div class="crm-sync-grid">
    <div>
      <strong data-crm-provider>Company CRM</strong>
      <p data-crm-policy>Portal actions queue updates, then post back to CRM after approval rules pass.</p>
    </div>
    <dl class="crm-sync-stats" data-crm-stats></dl>
  </div>
  <div class="crm-sync-footer">
    <span data-crm-mode>Mock adapter</span>
    <span data-crm-sync>Last sync pending</span>
    <button class="text-button" type="button" data-route-shortcut="services">Review workflows</button>
  </div>
</section>
