<section class="section-block people-moments" aria-labelledby="people-moments-title">
  <div class="section-header">
    <div>
      <p class="eyebrow">CRM people data</p>
      <h2 id="people-moments-title">People moments</h2>
    </div>
    <button class="text-button" type="button" data-route-shortcut="people">Open directory</button>
  </div>
  <div class="people-moments-grid">
    <section class="people-moment-column" aria-labelledby="birthdays-title">
      <div class="people-moment-heading">
        <h3 id="birthdays-title">Today birthdays</h3>
        <span class="count-label" data-birthday-count>0 people</span>
      </div>
      <div class="people-moment-list" data-birthdays></div>
    </section>
    <section class="people-moment-column" aria-labelledby="joiners-title">
      <div class="people-moment-heading">
        <h3 id="joiners-title">Weekly joiners</h3>
        <span class="count-label" data-joiner-count>0 people</span>
      </div>
      <div class="people-moment-list" data-joiners></div>
    </section>
    <section class="people-moment-column" aria-labelledby="leave-title">
      <div class="people-moment-heading">
        <h3 id="leave-title">On leave</h3>
        <span class="count-label" data-leave-count>0 people</span>
      </div>
      <div class="people-moment-list" data-leave></div>
    </section>
  </div>
</section>
