<header class="topbar">
  <button class="icon-button menu-toggle" type="button" aria-label="Open navigation" data-open-drawer>
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
  </button>

  <div class="page-title-block">
    <p class="eyebrow">KH3 Workplace</p>
    <h1 id="page-title">Home</h1>
  </div>

  <form class="global-search topbar-search" role="search" data-search-form>
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.8 4a5.8 5.8 0 0 1 4.6 9.4l4.1 4.1-1.4 1.4-4.1-4.1A5.8 5.8 0 1 1 9.8 4zm0 2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6z"/></svg>
    <label class="sr-only" for="topbar-search">Search portal</label>
    <input id="topbar-search" type="search" placeholder="Search people, requests, documents" data-global-search>
  </form>

  <div class="topbar-actions">
    <button class="ghost-button company-switcher" type="button">Switch company</button>
    <button class="icon-button" type="button" id="theme-toggle" aria-label="Switch to dark mode">
      <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5h2v3h-2zm0 17h2v3h-2zM2 11h3v2H2zm17 0h3v2h-3zM4.2 4.2l1.4-1.4 2.1 2.1-1.4 1.4zm12.1 12.1 1.4-1.4 2.1 2.1-1.4 1.4zM19.8 4.2l-2.1 2.1-1.4-1.4 2.1-2.1zM7.7 16.3l-2.1 2.1-1.4-1.4 2.1-2.1z"/></svg>
      <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 15.6A8.5 8.5 0 0 1 8.4 4 8.5 8.5 0 1 0 20 15.6z"/></svg>
    </button>
    <button class="notification-button" type="button" id="notifications-button" aria-label="View 5 unread notifications" aria-expanded="false" aria-controls="notification-drawer">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16v-5a6 6 0 0 0-5-5.9V3h-2v2.1A6 6 0 0 0 6 11v5l-2 2v1h16v-1zm-8 4a2 2 0 0 0 4 0z"/></svg>
      <span class="notification-dot"></span>
    </button>
    <button class="profile-button" type="button" aria-label="Open user menu">
      <span class="avatar avatar-blue">YA</span>
      <span>
        <strong>Yaa Addo</strong>
        <small>Operations Manager</small>
      </span>
    </button>
    <div data-component="profile-summary"></div>
  </div>
</header>
